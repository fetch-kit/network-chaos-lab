<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Async Request Chaos Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a13;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* ── UI Panel ─────────────────────────────────────────────── */
    #ui-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 16px 18px;
      width: 360px;
      max-height: calc(100vh - 32px);
      overflow-y: auto;
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #ui-panel h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      background: #1e40af;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary.active { background: #7c3aed; }
    .btn-primary.active:hover { background: #6d28d9; }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .btn-preset {
      padding: 4px 9px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      color: #94a3b8;
      font-size: 11px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .btn-preset:hover {
      background: rgba(255,255,255,0.1);
      color: #e2e8f0;
    }
    .btn-preset.active {
      background: rgba(99,102,241,0.25);
      border-color: #6366f1;
      color: #c7d2fe;
    }

    /* ── Legend ──────────────────────────────────────────────── */
    .legend {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #94a3b8;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Stats ───────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 10px;
      font-size: 12px;
      padding-top: 4px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }

    .stats span { white-space: nowrap; }

    #stat-total { grid-column: 1 / -1; color: #64748b; font-size: 11px; }

    /* ── Hedge badge color ──────────────────────────────────── */
    .hedge-badge-fill { color: #7c3aed; }  /* deep purple for hedges */

    /* ── Node Labels ─────────────────────────────────────────── */
    .node-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #94a3b8;
      background: rgba(10, 10, 20, 0.7);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      pointer-events: none;
      white-space: nowrap;
    }

    .btn-preset:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Scenario picker ─────────────────────────────────────── */
    .scenario-picker {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .scenario-picker select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #e2e8f0;
      font-size: 11px;
      padding: 6px 8px;
    }

    /* ── Timeline strip ──────────────────────────────────────── */
    #timeline-section {
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    /* ── Particle Retry Badge ────────────────────────────────── */
    .particle-badge {
      font-size: 10px;
      font-weight: 700;
      color: #fbbf24;
      background: rgba(20, 10, 0, 0.75);
      padding: 1px 4px;
      border-radius: 3px;
      border: 1px solid #f59e0b;
      pointer-events: none;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
